name: Daily Sanjie Soup Video Agent

on:
  schedule:
    # UTC 23:00 = 北京时间 7:00
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  daily-video:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r sanjie-soup-agent/requirements.txt

      - name: Run daily video agent
        working-directory: sanjie-soup-agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          JIMENG_API_KEY: ${{ secrets.JIMENG_API_KEY }}
          VOLCANO_TTS_KEY: ${{ secrets.VOLCANO_TTS_KEY }}
        run: python main.py

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-video-output
          path: sanjie-soup-agent/output/
          retention-days: 7
