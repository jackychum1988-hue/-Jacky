name: Daily Sanjie Soup Video Agent

on:
  # schedule:  # DISABLED 2026-06-17 — 每日视频生成已停用
  #   # UTC 23:00 = 北京时间 7:00
  #   - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-video:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r sanjie-soup-agent/requirements.txt

      - name: Run daily video agent
        working-directory: sanjie-soup-agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          JIMENG_API_KEY: ${{ secrets.JIMENG_API_KEY }}
          VOLCANO_TTS_KEY: ${{ secrets.VOLCANO_TTS_KEY }}
        run: python main.py

      - name: Persist history back to repo
        if: always()
        run: |
          git config user.name "Sanjie Soup Agent"
          git config user.email "agent@sanjie-soup.local"
          git add sanjie-soup-agent/history.json
          if git diff --cached --quiet; then
            echo "No history change to commit"
          else
            git commit -m "auto: update history.json after daily run"
            git push
          fi

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-video-output
          path: sanjie-soup-agent/output/
          retention-days: 7
