name: Weekly Market Video

on:
  schedule:
    # UTC 23:00 Sunday = 北京时间 周一 7:00
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  market-video:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pip-motion-effects

      # ── Python: 生成时间线 JSON ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r zs-property-agent/requirements.txt

      - name: Generate market timeline JSON
        working-directory: zs-property-agent
        run: python generate_market_timeline.py --output ../remotion-realestate/config/market-timeline.json

      - name: Show generated timeline stats
        working-directory: remotion-realestate
        run: |
          python3 -c "
          import json
          with open('config/market-timeline.json') as f:
              t = json.load(f)
          print(f'elements: {len(t[\"elements\"])}  frames: {t[\"durationInFrames\"]}  duration: {t[\"durationInFrames\"]/t[\"fps\"]:.0f}s')
          for el in t['elements']:
              print(f'  [{el[\"enterAt\"]:4d}→{el[\"exitAt\"]:4d}] {el[\"type\"]}')
          "

      # ── Node.js: 渲染 ProRes 4444 MOV ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Remotion dependencies
        working-directory: remotion-realestate
        run: npm ci

      - name: Debug environment
        working-directory: remotion-realestate
        run: |
          echo "=== Node version ==="
          node --version
          echo "=== npm version ==="
          npm --version
          echo "=== tsx available ==="
          npx tsx --version || echo "tsx NOT found"
          echo "=== render_pip.ts exists ==="
          ls -l scripts/render_pip.ts || echo "render_pip.ts NOT found"
          echo "=== src/index.ts exists ==="
          ls -l src/index.ts || echo "src/index.ts NOT found"
          echo "=== node_modules/.bin ==="
          ls node_modules/.bin/tsx || echo "tsx binary NOT in node_modules"
          echo "=== package.json scripts ==="
          node -e "console.log(JSON.parse(require('fs').readFileSync('package.json')).scripts)"

      - name: Render ProRes 4444 MOV
        working-directory: remotion-realestate
        run: npx tsx scripts/render_pip.ts config/market-timeline.json out/market-report.mov

      - name: Verify output
        run: |
          ls -lh remotion-realestate/out/market-report.mov
          file remotion-realestate/out/market-report.mov || echo "(file command not available)"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-report-video
          path: remotion-realestate/out/market-report.mov
          retention-days: 14
