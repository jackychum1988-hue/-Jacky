name: Daily ZS Property Report

on:
  push:
    paths:
      - "zs-property-agent/**"
      - ".github/workflows/daily-report.yml"
  schedule:
    - cron: "0 1 * * *"    # UTC 1:00 = 北京时间 9:00
    - cron: "0 2 * * *"    # UTC 2:00 = 北京时间 10:00 (fallback)
    - cron: "0 3 * * *"    # UTC 3:00 = 北京时间 11:00 (fallback)
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zs-property-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if already sent today
        id: check-sent
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "skip_if_sent=true" >> $GITHUB_OUTPUT
          else
            echo "skip_if_sent=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore sentinel
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: zs-property-agent/.sentinel
          key: daily-report-${{ steps.check-sent.outputs.today }}

      - name: Run daily report
        if: steps.check-sent.outputs.skip_if_sent != 'true' || steps.cache.outputs.cache-hit != 'true'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python main.py

      - name: Save sentinel
        if: success()
        uses: actions/cache/save@v4
        with:
          path: zs-property-agent/.sentinel
          key: daily-report-${{ steps.check-sent.outputs.today }}
