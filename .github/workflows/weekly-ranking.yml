name: Weekly Ranking Video
on:
  schedule:
    - cron: '0 0 * * 1' # UTC Mon 00:00 = Beijing Mon 08:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ----- Python: data pipeline -----
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r zs-ranking-agent/requirements.txt

      - name: Run ranking data pipeline
        id: pipeline
        run: |
          cd zs-ranking-agent
          python main.py || echo "WARNING: Scrapers failed, checking fallback..."
          # If timeline wasn't generated (empty data), fall back to manual compilation
          if [ ! -f output/timeline-latest.json ]; then
            echo "No timeline generated. Running manual data compilation..."
            python run_real_data.py || echo "FATAL: All data sources failed"
          fi
          echo "timeline_path=$(pwd)/output/timeline-latest.json" >> $GITHUB_OUTPUT

      - name: Upload timeline JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ranking-timeline
          path: zs-ranking-agent/output/timeline-*.json
          retention-days: 30

      # ----- Node.js: video rendering -----
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Remotion dependencies
        run: cd remotion-realestate && npm ci

      - name: Render ranking overlay video
        run: cd remotion-realestate && npx tsx scripts/ci-render.ts

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ranking-video
          path: remotion-realestate/out/zhongshan-ranking-*.mov
          retention-days: 7

      # ----- Push history.json back to repo -----
      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zs-ranking-agent/history.json
          git diff --staged --quiet || git commit -m "auto: update ranking history after weekly run"
          git push
